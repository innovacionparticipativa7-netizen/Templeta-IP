<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Generador IP – Safran+ Tijuana</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<style>
:root{
  --blue:#0070C0;--blue-dark:#005A9E;--gold:#FFE07D;
  --g50:#F8FAFC;--g100:#F1F5F9;--g200:#E2E8F0;--g400:#94A3B8;
  --g600:#475569;--g800:#1E293B;--success:#00A550;--danger:#E53E3E;
  --r:10px;--font:'Segoe UI',system-ui,sans-serif;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font);background:#F0F4F8;min-height:100vh;color:var(--g800)}
header{background:var(--blue);color:#fff;padding:0 28px;height:58px;display:flex;align-items:center;gap:14px}
.logo{font-size:20px;font-weight:800;color:#fff}
.logo span{color:var(--gold)}
.subtitle{font-size:13px;opacity:.75}
.container{max-width:780px;margin:36px auto;padding:0 18px 60px}
.stepper{display:flex;align-items:flex-start;justify-content:center;margin-bottom:32px;position:relative}
.stepper-line{position:absolute;top:19px;left:calc(50% - 230px);width:460px;height:2px;background:var(--g200);z-index:0}
.step-item{display:flex;flex-direction:column;align-items:center;gap:5px;width:78px;z-index:1;cursor:default}
.step-circle{width:38px;height:38px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:14px;border:3px solid var(--g200);background:#fff;color:var(--g400);transition:all .3s}
.step-item.done .step-circle{background:var(--success);border-color:var(--success);color:#fff}
.step-item.done{cursor:pointer}
.step-item.active .step-circle{background:var(--blue);border-color:var(--blue);color:#fff}
.step-label{font-size:11px;color:var(--g400);text-align:center;font-weight:500}
.step-item.active .step-label{color:var(--blue);font-weight:700}
.step-item.done .step-label{color:var(--success)}
.card{background:#fff;border-radius:var(--r);box-shadow:0 3px 18px rgba(0,0,0,.09);padding:32px 36px}
.card-title{font-size:20px;font-weight:800;color:var(--blue);margin-bottom:4px}
.card-desc{font-size:14px;color:var(--g600);margin-bottom:24px;line-height:1.5}
.field{margin-bottom:20px}
.field label{display:block;font-size:12px;font-weight:600;color:var(--g600);margin-bottom:5px;text-transform:uppercase;letter-spacing:.5px}
.req{color:var(--danger);margin-left:2px}
input[type=text],textarea,select{width:100%;border:2px solid var(--g200);border-radius:8px;padding:10px 13px;font-size:14px;font-family:var(--font);color:var(--g800);background:var(--g50);transition:border-color .2s;outline:none}
input:focus,textarea:focus,select:focus{border-color:var(--blue);background:#fff}
textarea{resize:vertical;min-height:90px}
.field-row{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.img-upload{border:2px dashed var(--g200);border-radius:8px;padding:18px;text-align:center;cursor:pointer;background:var(--g50);position:relative;transition:all .2s}
.img-upload:hover{border-color:var(--blue);background:#EFF6FF}
.img-upload input[type=file]{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%}
.img-upload p{font-size:13px;color:var(--g600)}
.img-preview{width:100%;max-height:120px;object-fit:cover;border-radius:6px;margin-top:8px}
.img-clear{display:inline-block;margin-top:5px;font-size:12px;color:var(--danger);cursor:pointer;background:none;border:none;text-decoration:underline;font-family:var(--font)}
.colab-list{display:flex;flex-direction:column;gap:9px;margin-bottom:10px}
.colab-item{display:grid;grid-template-columns:1fr 130px 34px;gap:7px;align-items:center}
.colab-item input{padding:8px 11px;font-size:14px;border:2px solid var(--g200);border-radius:8px;background:var(--g50);outline:none;font-family:var(--font);width:100%}
.colab-item input:focus{border-color:var(--blue);background:#fff}
.btn-remove{width:34px;height:34px;border-radius:8px;border:2px solid #FED7D7;background:#FFF5F5;color:var(--danger);font-size:17px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.btn-remove:hover{background:var(--danger);color:#fff;border-color:var(--danger)}
.btn-add-colab{display:flex;align-items:center;gap:5px;padding:7px 15px;border:2px dashed var(--blue);border-radius:8px;background:#EFF6FF;color:var(--blue);font-size:13px;font-weight:600;cursor:pointer;font-family:var(--font)}
.btn-add-colab:hover{background:var(--blue);color:#fff}
.btn-row{display:flex;justify-content:space-between;gap:10px;margin-top:26px;padding-top:22px;border-top:2px solid var(--g100)}
.btn{padding:11px 26px;border-radius:9px;font-size:14px;font-weight:700;cursor:pointer;border:none;transition:all .2s;font-family:var(--font)}
.btn-primary{background:var(--blue);color:#fff}
.btn-primary:hover{background:var(--blue-dark)}
.btn-primary:disabled{background:var(--g400);cursor:not-allowed}
.btn-secondary{background:var(--g100);color:var(--g600);border:2px solid var(--g200)}
.btn-secondary:hover{background:var(--g200)}
.btn-success{background:var(--success);color:#fff;font-size:15px;padding:13px 30px}
.btn-success:hover{background:#007A3D}
.preview-strip{background:linear-gradient(135deg,#0070C0,#005A9E);border-radius:var(--r);padding:18px 22px;margin-bottom:18px;color:#fff}
.preview-strip h3{font-size:17px;margin-bottom:3px}
.preview-strip p{font-size:12px;opacity:.75}
.preview-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:14px}
.preview-field{background:var(--g50);border-radius:8px;padding:11px 13px;border:1px solid var(--g200)}
.pf-label{font-size:11px;font-weight:700;color:var(--g400);text-transform:uppercase;letter-spacing:.5px;margin-bottom:3px}
.pf-value{font-size:13px;color:var(--g800);font-weight:600}
.full{grid-column:span 2}
.spinner{width:50px;height:50px;border:4px solid var(--g200);border-top-color:var(--blue);border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 18px}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-box{text-align:center;padding:56px 36px}
.loading-box h3{font-size:19px;margin-bottom:6px}
.loading-box p{color:var(--g600);font-size:14px}
.success-box{text-align:center;padding:44px 36px}
.success-icon{font-size:58px;margin-bottom:14px}
.success-box h2{font-size:24px;color:var(--success);margin-bottom:6px}
.success-box p{color:var(--g600);margin-bottom:24px}
.success-btns{display:flex;gap:10px;justify-content:center;flex-wrap:wrap}
.hint{font-size:12px;color:var(--g400);margin-top:3px}
.error-msg{background:#FFF5F5;border:2px solid #FED7D7;border-radius:8px;padding:11px 14px;color:var(--danger);font-size:14px;margin-top:10px}
@media(max-width:600px){
  .card{padding:22px 18px}
  .field-row{grid-template-columns:1fr}
  .preview-grid{grid-template-columns:1fr}
  .full{grid-column:span 1}
  .colab-item{grid-template-columns:1fr 100px 34px}
  .step-label{display:none}
  .step-item{width:50px}
}
</style>
</head>

        rel.setAttribute('Id',rId);rel.setAttribute('Type','http://schemas.openxmlformats.org/officeDocument/2006/relationships/image');rel.setAttribute('Target','../media/'+fname);
        rdoc.documentElement.appendChild(rel);
        const picXml='<p:pic xmlns:p="'+NSP+'" xmlns:a="'+NSA+'" xmlns:r="'+NSR+'"><p:nvPicPr><p:cNvPr id="'+(9000+imgN)+'" name="UI_'+rId+'"/><p:cNvPicPr><a:picLocks noChangeAspect="1"/></p:cNvPicPr><p:nvPr/></p:nvPicPr><p:blipFill><a:blip r:embed="'+rId+'"/><a:stretch><a:fillRect/></a:stretch></p:blipFill><p:spPr><a:xfrm><a:off x="'+x+'" y="'+y+'"/><a:ext cx="'+cx+'" cy="'+cy+'"/></a:xfrm><a:prstGeom prst="rect"><a:avLst/></a:prstGeom></p:spPr></p:pic>';
        const lat=await zip.file(slidePath).async('string');
        const ldoc=parser.parseFromString(lat,'application/xml');
        const spTree=ldoc.getElementsByTagNameNS(NSP,'spTree')[0];
        if(spTree){spTree.appendChild(ldoc.importNode(parser.parseFromString(picXml,'application/xml').documentElement,true));zip.file(slidePath,ser.serializeToString(ldoc));}
      }
      await addImg(S.antes_img,201920,1820000,4200000,1380000);
      await addImg(S.despues_img,6700000,1280000,2200000,760000);
      zip.file(relsPath,ser.serializeToString(rdoc));
    }
    const blob=await zip.generateAsync({type:'blob',mimeType:'application/vnd.openxmlformats-officedocument.presentationml.presentation',compression:'DEFLATE'});
    set({loading:false,success:true,dlUrl:URL.createObjectURL(blob)});
  }catch(err){
    console.error('Error:',err);
    set({loading:false,error:err.message});
  }
}

async function loadImg(e,field){
  const f=e.target.files[0];if(!f)return;
  if(f.size>5*1024*1024){alert('Imagen máx 5MB');return;}
  const data=await new Promise(res=>{const r=new FileReader();r.onload=ev=>res({data:ev.target.result.split(',')[1],ext:f.name.split('.').pop().toLowerCase(),preview:ev.target.result});r.readAsDataURL(f);});
  set({[field]:data});
}

function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}
function validate(s){
  if(s===1)return S.titulo.trim()?[]:['x'];
  if(s===2)return S.antes_texto.trim()?[]:['x'];
  if(s===3)return S.despues_texto.trim()?[]:['x'];
  if(s===4)return(S.beneficios.trim()&&S.costo.trim())?[]:['x'];
  if(s===5)return S.colabs.some(c=>c.nombre.trim())?[]:['x'];
  return[];
}
const LABS=['Info','Antes','Despu\u00e9s','Beneficios','Equipo','Generar'];

function imgUp(id,cur){
  if(cur)return'<div class="img-upload" style="pointer-events:none"><img src="'+cur.preview+'" class="img-preview"/></div><button class="img-clear" id="clr-'+id+'">\u2715 Quitar</button>';
  return'<div class="img-upload"><input type="file" id="'+id+'" accept="image/*"/><p style="font-size:15px;margin-bottom:4px">\ud83d\uddbc\ufe0f</p><p><strong>Clic para subir</strong> imagen (opcional)</p><p style="font-size:11px;color:#94A3B8;margin-top:2px">JPG \u00b7 PNG \u00b7 WEBP \u00b7 m\u00e1x 5MB</p></div>';
}

function render(){
  const app=document.getElementById('app');if(!app)return;
  if(S.loading){app.innerHTML='<div class="card"><div class="loading-box"><div class="spinner"></div><h3>Generando presentaci\u00f3n...</h3><p>Construyendo el archivo PowerPoint.</p></div></div>';return;}
  if(S.success){
    const fn='IP_'+S.mes+'_'+S.anio+'_'+S.titulo.substring(0,28).replace(/\s+/g,'_')+'.pptx';
    app.innerHTML='<div class="card"><div class="success-box"><div class="success-icon">\ud83c\udf89</div><h2>\u00a1Listo!</h2><p>Tu presentaci\u00f3n est\u00e1 lista.</p><div class="success-btns"><a href="'+S.dlUrl+'" download="'+fn+'" class="btn btn-success" style="text-decoration:none">\u2b07\ufe0f Descargar PPTX</a><button class="btn btn-secondary" id="nuevo">Crear otra IP</button></div></div></div>';
    document.getElementById('nuevo').onclick=()=>{Object.assign(S,{step:1,success:false,error:null,dlUrl:null,titulo:'',antes_texto:'',antes_img:null,despues_texto:'',despues_img:null,beneficios:'',costo:'',colabs:[{nombre:'',empleado:''}]});render();};
    return;
  }
  const ok=validate(S.step).length===0;
  const yrs=[2023,2024,2025,2026,2027,2028,2029,2030].map(y=>'<option value="'+y+'"'+(S.anio==y?' selected':'')+'>'+y+'</option>').join('');
  const ms=MESES.map(m=>'<option value="'+m+'"'+(S.mes===m?' selected':'')+'>'+m+'</option>').join('');
  const nav='<div class="btn-row">'+(S.step>1?'<button class="btn btn-secondary" id="bk">\u2190 Regresar</button>':'<div></div>')+(S.step<6?'<button class="btn btn-primary" id="nx"'+(ok?'':' disabled')+'>Continuar \u2192</button>':'')+'</div>';

  let content='';
  if(S.step===1)content='<div class="card-title">\ud83d\udccb Informaci\u00f3n General</div><p class="card-desc">Datos b\u00e1sicos de la idea de propuesta.</p><div class="field-row"><div class="field"><label>Mes <span class="req">*</span></label><select id="mes">'+ms+'</select></div><div class="field"><label>A\u00f1o <span class="req">*</span></label><select id="anio">'+yrs+'</select></div></div><div class="field"><label>T\u00edtulo <span class="req">*</span></label><input type="text" id="tit" placeholder="Ej: Optimizaci\u00f3n del proceso de ensamble" value="'+esc(S.titulo)+'" maxlength="120"/><p class="hint">M\u00e1ximo 120 caracteres</p></div>'+nav;
  else if(S.step===2)content='<div class="card-title">\ud83d\udd34 Situaci\u00f3n Antes</div><p class="card-desc">Describe el problema <strong>antes</strong> de la mejora.</p><div class="field"><label>Descripci\u00f3n ANTES <span class="req">*</span></label><textarea id="at" placeholder="Ej: El proceso tardaba 45 min con errores frecuentes...">'+esc(S.antes_texto)+'</textarea></div><div class="field"><label>Imagen ANTES (opcional)</label>'+imgUp('ai',S.antes_img)+'</div>'+nav;
  else if(S.step===3)content='<div class="card-title">\ud83d\udfe2 Situaci\u00f3n Despu\u00e9s</div><p class="card-desc">Describe el resultado <strong>despu\u00e9s</strong> de la mejora.</p><div class="field"><label>Descripci\u00f3n DESPU\u00c9S <span class="req">*</span></label><textarea id="dt" placeholder="Ej: Se redujo a 25 min eliminando pasos redundantes...">'+esc(S.despues_texto)+'</textarea></div><div class="field"><label>Imagen DESPU\u00c9S (opcional)</label>'+imgUp('di',S.despues_img)+'</div>'+nav;
  else if(S.step===4)content='<div class="card-title">\ud83d\udca1 Beneficios y Costo</div><p class="card-desc">Cuantifica los resultados y el costo.</p><div class="field"><label>Beneficios / Mejoras <span class="req">*</span></label><textarea id="bn" placeholder="Ej: Ahorro $50,000 MXN anuales. Reducci\u00f3n 44% tiempo...">'+esc(S.beneficios)+'</textarea></div><div class="field"><label>Costo de Implementaci\u00f3n <span class="req">*</span></label><input type="text" id="co" placeholder="Ej: $5,000 MXN \u00b7 0\u20ac" value="'+esc(S.costo)+'"/></div>'+nav;
  else if(S.step===5)content='<div class="card-title">\ud83d\udc65 Colaboradores</div><p class="card-desc">Agrega a todos los participantes.</p><div class="colab-list" id="cl">'+S.colabs.map((c,i)=>'<div class="colab-item"><input type="text" class="cn" data-i="'+i+'" placeholder="Nombre completo" value="'+esc(c.nombre)+'"/><input type="text" class="ce" data-i="'+i+'" placeholder="# Empleado" value="'+esc(c.empleado)+'"/><button class="btn-remove" data-i="'+i+'">&times;</button></div>').join('')+'</div><button class="btn-add-colab" id="addC">+ Agregar colaborador</button>'+nav;
  else if(S.step===6){
    const v=S.colabs.filter(c=>c.nombre.trim());
    content='<div class="card-title">\u2728 Revisi\u00f3n Final</div><p class="card-desc">Confirma los datos y genera tu presentaci\u00f3n.</p>'
      +'<div class="preview-strip"><h3>The idea of '+esc(S.mes)+' '+esc(S.anio)+'</h3><p>'+esc(S.titulo)+'</p></div>'
      +'<div class="preview-grid">'
      +'<div class="preview-field"><div class="pf-label">\ud83d\udd34 Antes</div><div class="pf-value" style="font-weight:400;font-size:13px">'+esc(S.antes_texto).substring(0,90)+(S.antes_texto.length>90?'...':'')+'</div></div>'
      +'<div class="preview-field"><div class="pf-label">\ud83d\udfe2 Despu\u00e9s</div><div class="pf-value" style="font-weight:400;font-size:13px">'+esc(S.despues_texto).substring(0,90)+(S.despues_texto.length>90?'...':'')+'</div></div>'
      +'<div class="preview-field full"><div class="pf-label">\ud83d\udca1 Beneficios</div><div class="pf-value" style="font-weight:400;font-size:13px">'+esc(S.beneficios).substring(0,160)+'</div></div>'
      +'<div class="preview-field"><div class="pf-label">\ud83d\udcb0 Costo</div><div class="pf-value">'+esc(S.costo)+'</div></div>'
      +'<div class="preview-field"><div class="pf-label">\ud83d\udc65 Equipo</div><div class="pf-value" style="font-size:12px;font-weight:400">'+v.map(c=>esc(c.nombre)+(c.empleado?' #'+esc(c.empleado):'')).join(' \u00b7 ')+'</div></div>'
      +(S.antes_img?'<div class="preview-field"><div class="pf-label">\ud83d\udcf7 Antes</div><img src="'+S.antes_img.preview+'" style="width:100%;height:55px;object-fit:cover;border-radius:4px;margin-top:3px"/></div>':'')
      +(S.despues_img?'<div class="preview-field"><div class="pf-label">\ud83d\udcf7 Despu\u00e9s</div><img src="'+S.despues_img.preview+'" style="width:100%;height:55px;object-fit:cover;border-radius:4px;margin-top:3px"/></div>':'')
      +'</div>'
      +'<div class="btn-row"><button class="btn btn-secondary" id="bk">\u2190 Regresar</button><button class="btn btn-success" id="gen">\u2728 Generar Presentaci\u00f3n</button></div>'
      +(S.error?'<div class="error-msg">\u26a0\ufe0f '+esc(S.error)+'</div>':'');
  }

  const stepper='<div class="stepper"><div class="stepper-line"></div>'+LABS.map((s,i)=>{const n=i+1,cls=n<S.step?'done':n===S.step?'active':'';return'<div class="step-item '+cls+'" data-step="'+n+'"><div class="step-circle">'+(n<S.step?'\u2713':n)+'</div><div class="step-label">'+s+'</div></div>';}).join('')+'</div>';
  app.innerHTML=stepper+'<div class="card">'+content+'</div>';

  document.querySelectorAll('.step-item.done').forEach(el=>el.addEventListener('click',()=>set({step:parseInt(el.dataset.step)})));
  const bk=document.getElementById('bk');if(bk)bk.onclick=()=>set({step:S.step-1});
  const nx=document.getElementById('nx');if(nx)nx.onclick=()=>{if(validate(S.step).length===0)set({step:S.step+1});};
  const gen=document.getElementById('gen');if(gen)gen.onclick=generatePPTX;
  const mes=document.getElementById('mes');if(mes)mes.onchange=e=>set({mes:e.target.value});
  const anio=document.getElementById('anio');if(anio)anio.onchange=e=>set({anio:e.target.value});
  const tit=document.getElementById('tit');if(tit)tit.oninput=e=>{S.titulo=e.target.value;const n=document.getElementById('nx');if(n)n.disabled=validate(S.step).length>0;};
  const at=document.getElementById('at');if(at)at.oninput=e=>{S.antes_texto=e.target.value;const n=document.getElementById('nx');if(n)n.disabled=validate(S.step).length>0;};
  const ai=document.getElementById('ai');if(ai)ai.onchange=e=>loadImg(e,'antes_img');
  const clrai=document.getElementById('clr-ai');if(clrai)clrai.onclick=()=>set({antes_img:null});
  const dt=document.getElementById('dt');if(dt)dt.oninput=e=>{S.despues_texto=e.target.value;const n=document.getElementById('nx');if(n)n.disabled=validate(S.step).length>0;};
  const di=document.getElementById('di');if(di)di.onchange=e=>loadImg(e,'despues_img');
  const clrdi=document.getElementById('clr-di');if(clrdi)clrdi.onclick=()=>set({despues_img:null});
  const bn=document.getElementById('bn');if(bn)bn.oninput=e=>{S.beneficios=e.target.value;const n=document.getElementById('nx');if(n)n.disabled=validate(S.step).length>0;};
  const co=document.getElementById('co');if(co)co.oninput=e=>{S.costo=e.target.value;const n=document.getElementById('nx');if(n)n.disabled=validate(S.step).length>0;};
  document.querySelectorAll('.cn').forEach(el=>el.oninput=e=>{S.colabs[+e.target.dataset.i].nombre=e.target.value;const n=document.getElementById('nx');if(n)n.disabled=validate(S.step).length>0;});
  document.querySelectorAll('.ce').forEach(el=>el.oninput=e=>S.colabs[+e.target.dataset.i].empleado=e.target.value);
  document.querySelectorAll('.btn-remove').forEach(el=>el.onclick=e=>{const i=+e.target.dataset.i;if(S.colabs.length>1){S.colabs.splice(i,1);set({colabs:[...S.colabs]});}});
  const addC=document.getElementById('addC');if(addC)addC.onclick=()=>set({colabs:[...S.colabs,{nombre:'',empleado:''}]});
}
render();
</script>
</body>
</html>
