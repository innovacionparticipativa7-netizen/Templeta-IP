<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Generador IP de templeta</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>

<style>
:root{
  --blue:#0070C0;
  --blue-dark:#005A9E;
  --gold:#FFE07D;
  --g50:#F8FAFC;
  --g100:#F1F5F9;
  --g200:#E2E8F0;
  --g400:#94A3B8;
  --g600:#475569;
  --g800:#1E293B;
  --success:#00A550;
  --danger:#E53E3E;
  --r:10px;
  --font:'Segoe UI',system-ui,sans-serif;
}

*,*::before,*::after{
  box-sizing:border-box;
  margin:0;
  padding:0;
}

body{
  font-family:var(--font);
  background:#F0F4F8;
  min-height:100vh;
  color:var(--g800);
}

header{
  background:var(--blue);
  color:#fff;
  padding:0 28px;
  height:58px;
  display:flex;
  align-items:center;
  gap:14px;
}

.logo{
  font-size:20px;
  font-weight:800;
  color:#fff;
}

.logo span{
  color:var(--gold);
}

.subtitle{
  font-size:13px;
  opacity:.75;
}

.container{
  max-width:780px;
  margin:36px auto;
  padding:0 18px 60px;
}

.stepper{
  display:flex;
  align-items:flex-start;
  justify-content:center;
  margin-bottom:32px;
  position:relative;
}

.stepper-line{
  position:absolute;
  top:19px;
  left:calc(50% - 230px);
  width:460px;
  height:2px;
  background:var(--g200);
  z-index:0;
}

.step-item{
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:5px;
  width:78px;
  z-index:1;
  cursor:default;
}

.step-circle{
  width:38px;
  height:38px;
  border-radius:50%;
  display:flex;
  align-items:center;
  justify-content:center;
  font-weight:700;
  font-size:14px;
  border:3px solid var(--g200);
  background:#fff;
  color:var(--g400);
  transition:all .3s;
}

.step-item.done .step-circle{
  background:var(--success);
  border-color:var(--success);
  color:#fff;
}

.step-item.done{
  cursor:pointer;
}

.step-item.active .step-circle{
  background:var(--blue);
  border-color:var(--blue);
  color:#fff;
}

.step-label{
  font-size:11px;
  color:var(--g400);
  text-align:center;
  font-weight:500;
}

.step-item.active .step-label{
  color:var(--blue);
  font-weight:700;
}

.step-item.done .step-label{
  color:var(--success);
}

.card{
  background:#fff;
  border-radius:var(--r);
  box-shadow:0 3px 18px rgba(0,0,0,.09);
  padding:32px 36px;
}

.card-title{
  font-size:20px;
  font-weight:800;
  color:var(--blue);
  margin-bottom:4px;
}

.card-desc{
  font-size:14px;
  color:var(--g600);
  margin-bottom:24px;
  line-height:1.5;
}

.field{
  margin-bottom:20px;
}

.field label{
  display:block;
  font-size:12px;
  font-weight:600;
  color:var(--g600);
  margin-bottom:5px;
  text-transform:uppercase;
  letter-spacing:.5px;
}

.req{
  color:var(--danger);
  margin-left:2px;
}

input[type=text],textarea,select{
  width:100%;
  border:2px solid var(--g200);
  border-radius:8px;
  padding:10px 13px;
  font-size:14px;
  font-family:var(--font);
  color:var(--g800);
  background:var(--g50);
  transition:border-color .2s;
  outline:none;
}

input:focus,textarea:focus,select:focus{
  border-color:var(--blue);
  background:#fff;
}

textarea{
  resize:vertical;
  min-height:90px;
}

.field-row{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:14px;
}

.counter{
  font-size:11px;
  color:var(--g400);
  text-align:right;
  margin-top:4px;
}

.counter.limit{
  color:var(--danger);
  font-weight:700;
}

.img-upload{
  border:2px dashed var(--g200);
  border-radius:8px;
  padding:18px;
  text-align:center;
  cursor:pointer;
  background:var(--g50);
  position:relative;
  transition:all .2s;
}

.img-upload:hover{
  border-color:var(--blue);
  background:#EFF6FF;
}

.img-upload input[type=file]{
  position:absolute;
  inset:0;
  opacity:0;
  cursor:pointer;
  width:100%;
  height:100%;
}

.img-upload p{
  font-size:13px;
  color:var(--g600);
}

.img-preview{
  width:100%;
  max-height:120px;
  object-fit:cover;
  border-radius:6px;
  margin-top:8px;
}

.img-clear{
  display:inline-block;
  margin-top:5px;
  font-size:12px;
  color:var(--danger);
  cursor:pointer;
  background:none;
  border:none;
  text-decoration:underline;
  font-family:var(--font);
}

.colab-list{
  display:flex;
  flex-direction:column;
  gap:9px;
  margin-bottom:10px;
}

.colab-item{
  display:grid;
  grid-template-columns:1fr 100px 1fr 34px;
  gap:7px;
  align-items:center;
}

.colab-item input{
  padding:8px 11px;
  font-size:14px;
  border:2px solid var(--g200);
  border-radius:8px;
  background:var(--g50);
  outline:none;
  font-family:var(--font);
  width:100%;
}

.colab-item input:focus{
  border-color:var(--blue);
  background:#fff;
}

.colab-item select{
  padding:8px 11px;
  font-size:13px;
}

.btn-remove{
  width:34px;
  height:34px;
  border-radius:8px;
  border:2px solid #FED7D7;
  background:#FFF5F5;
  color:var(--danger);
  font-size:17px;
  cursor:pointer;
  display:flex;
  align-items:center;
  justify-content:center;
}

.btn-remove:hover{
  background:var(--danger);
  color:#fff;
  border-color:var(--danger);
}

.btn-add-colab{
  display:flex;
  align-items:center;
  gap:5px;
  padding:7px 15px;
  border:2px dashed var(--blue);
  border-radius:8px;
  background:#EFF6FF;
  color:var(--blue);
  font-size:13px;
  font-weight:600;
  cursor:pointer;
  font-family:var(--font);
}

.btn-add-colab:hover{
  background:var(--blue);
  color:#fff;
}

.colab-headers{
  display:grid;
  grid-template-columns:1fr 100px 1fr 34px;
  gap:7px;
  margin-bottom:4px;
  padding:0 2px;
}

.colab-headers span{
  font-size:11px;
  font-weight:600;
  color:var(--g400);
  text-transform:uppercase;
  letter-spacing:.4px;
}

.btn-row{
  display:flex;
  justify-content:space-between;
  gap:10px;
  margin-top:26px;
  padding-top:22px;
  border-top:2px solid var(--g100);
}

.btn{
  padding:11px 26px;
  border-radius:9px;
  font-size:14px;
  font-weight:700;
  cursor:pointer;
  border:none;
  transition:all .2s;
  font-family:var(--font);
}

.btn-primary{
  background:var(--blue);
  color:#fff;
}

.btn-primary:hover{
  background:var(--blue-dark);
}

.btn-primary:disabled{
  background:var(--g400);
  cursor:not-allowed;
}

.btn-secondary{
  background:var(--g100);
  color:var(--g600);
  border:2px solid var(--g200);
}

.btn-secondary:hover{
  background:var(--g200);
}

.btn-success{
  background:var(--success);
  color:#fff;
  font-size:15px;
  padding:13px 30px;
}

.btn-success:hover{
  background:#007A3D;
}

.preview-strip{
  background:linear-gradient(135deg,#0070C0,#005A9E);
  border-radius:var(--r);
  padding:18px 22px;
  margin-bottom:18px;
  color:#fff;
}

.preview-strip h3{
  font-size:17px;
  margin-bottom:3px;
}

.preview-strip p{
  font-size:12px;
  opacity:.75;
}

.preview-grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:14px;
  margin-bottom:14px;
}

.preview-field{
  background:var(--g50);
  border-radius:8px;
  padding:11px 13px;
  border:1px solid var(--g200);
}

.pf-label{
  font-size:11px;
  font-weight:700;
  color:var(--g400);
  text-transform:uppercase;
  letter-spacing:.5px;
  margin-bottom:3px;
}

.pf-value{
  font-size:13px;
  color:var(--g800);
  font-weight:600;
}

.full{
  grid-column:span 2;
}

.spinner{
  width:50px;
  height:50px;
  border:4px solid var(--g200);
  border-top-color:var(--blue);
  border-radius:50%;
  animation:spin .8s linear infinite;
  margin:0 auto 18px;
}

@keyframes spin{
  to{transform:rotate(360deg)}
}

.loading-box{
  text-align:center;
  padding:56px 36px;
}

.loading-box h3{
  font-size:19px;
  margin-bottom:6px;
}

.loading-box p{
  color:var(--g600);
  font-size:14px;
}

.success-box{
  text-align:center;
  padding:44px 36px;
}

.success-icon{
  font-size:58px;
  margin-bottom:14px;
}

.success-box h2{
  font-size:24px;
  color:var(--success);
  margin-bottom:6px;
}

.success-box p{
  color:var(--g600);
  margin-bottom:24px;
}

.success-btns{
  display:flex;
  gap:10px;
  justify-content:center;
  flex-wrap:wrap;
}

.hint{
  font-size:12px;
  color:var(--g400);
  margin-top:3px;
}

.error-msg{
  background:#FFF5F5;
  border:2px solid #FED7D7;
  border-radius:8px;
  padding:11px 14px;
  color:var(--danger);
  font-size:14px;
  margin-top:10px;
}

@media(max-width:600px){
  .card{ padding:22px 18px; }
  .field-row{ grid-template-columns:1fr; }
  .preview-grid{ grid-template-columns:1fr; }
  .full{ grid-column:span 1; }
  .colab-item{
    grid-template-columns:1fr 90px 34px;
    grid-template-rows:auto auto;
  }
  .colab-item .ca{ grid-column:1 / 3; }
  .colab-headers{ grid-template-columns:1fr 90px 34px; }
  .step-label{ display:none; }
  .step-item{ width:50px; }
}
</style>
</head>

const S={
  step:1,loading:false,error:null,success:false,dlUrl:null,
  mes:MESES[new Date().getMonth()],anio:String(new Date().getFullYear()),
  titulo:'',antes_texto:'',antes_img:null,despues_texto:'',despues_img:null,

};

function set(u){ Object.assign(S,u); render(); }

function b64ToU8(b64){
  const clean=b64.replace(/\s/g,'');
  const bin=atob(clean);
  const a=new Uint8Array(bin.length);
  for(let i=0;i<bin.length;i++) a[i]=bin.charCodeAt(i);
  return a;
}

function esc(s){
  return String(s||'')
    .replace(/&/g,'&amp;').replace(/</g,'&lt;')
    .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function trimLimit(v,l){ return String(v||'').substring(0,l); }

function fontByLength(text,normal,medium,small){
  const len=String(text||'').length;
  if(len<=120) return normal;
  if(len<=240) return medium;
  return small;
}

function makeRun(text,{sz=1100,bold=false,color=null,typeface=null}={}){
  const r=document.createElementNS(NSA,'a:r');
  const rpr=document.createElementNS(NSA,'a:rPr');
  rpr.setAttribute('lang','es-MX');
  rpr.setAttribute('sz',String(sz));
  rpr.setAttribute('dirty','0');
  if(bold) rpr.setAttribute('b','1');
  if(color){
    const sf=document.createElementNS(NSA,'a:solidFill');
    const sc=document.createElementNS(NSA,'a:srgbClr');
    sc.setAttribute('val',color);
    sf.appendChild(sc);
    rpr.appendChild(sf);
  }
  if(typeface){
    const lat=document.createElementNS(NSA,'a:latin');
    lat.setAttribute('typeface',typeface);
    rpr.appendChild(lat);
  }
  r.appendChild(rpr);
  const t=document.createElementNS(NSA,'a:t');
  t.textContent=String(text||'');
  r.appendChild(t);
  return r;
}

function makePara(run=null,{noBullet=true,align=null}={}){
  const p=document.createElementNS(NSA,'a:p');
  if(noBullet||align){
    const pPr=document.createElementNS(NSA,'a:pPr');
    if(noBullet) pPr.appendChild(document.createElementNS(NSA,'a:buNone'));
    if(align) pPr.setAttribute('algn',align);
    p.appendChild(pPr);
  }
  if(run){
    p.appendChild(run);
  }else{
    const ep=document.createElementNS(NSA,'a:endParaRPr');
    ep.setAttribute('lang','es-MX');
    ep.setAttribute('dirty','0');
    p.appendChild(ep);
  }
  return p;
}

function findByName(doc,tag,name){
  const all=doc.getElementsByTagName('*');
  for(const el of all){
    if(el.localName===tag){
      const childs=el.getElementsByTagName('*');
      for(const child of childs){
        if(child.localName==='cNvPr'&&child.getAttribute('name')===name) return el;
      }
    }
  }
  return null;
}

function getShape(doc,name){ return findByName(doc,'sp',name); }
function getFrame(doc,name){ return findByName(doc,'graphicFrame',name); }

function getCell(gf,row,col){
  if(!gf) return null;
  const rows=[...gf.getElementsByTagName('*')].filter(e=>e.localName==='tr');
  if(row>=rows.length) return null;
  const cells=[...rows[row].getElementsByTagName('*')].filter(e=>e.localName==='tc');
  if(col>=cells.length) return null;
  const txBodies=[...cells[col].getElementsByTagName('*')].filter(e=>e.localName==='txBody');
  return txBodies[0]||null;
}

function clearTx(tb){
  if(!tb) return;
  const paras=[...tb.getElementsByTagName('*')].filter(e=>e.localName==='p');
  paras.forEach(p=>{ if(p.parentNode) p.parentNode.removeChild(p); });
}

function writeTextToCell(cell,text,options={}){
  if(!cell) return;
  clearTx(cell);
  const size=options.size||1000;
  const bold=options.bold||false;
  const align=options.align||null;
  const color=options.color||null;
  const lines=String(text||'').split('\n').filter(x=>x.trim()!=='');
  if(lines.length===0){ cell.appendChild(makePara()); return; }
  lines.forEach(line=>{
    cell.appendChild(makePara(makeRun(line,{sz:size,bold:bold,color:color}),{noBullet:true,align:align}));
  });
}

function validate(s){
  const e=[];
  if(s===1){
    if(!S.titulo.trim()) e.push('Título requerido');
    if(S.titulo.length>LIMITS.titulo) e.push('Título demasiado largo');
  }
  if(s===2){
    if(!S.antes_texto.trim()) e.push('Problema requerido');
    if(S.antes_texto.length>LIMITS.antes_texto) e.push('Problema demasiado largo');
  }
  if(s===3){
    if(!S.despues_texto.trim()) e.push('Propuesta requerida');
    if(S.despues_texto.length>LIMITS.despues_texto) e.push('Propuesta demasiado larga');
  }
  if(s===4){
    if(!S.beneficios.trim()) e.push('Beneficios requeridos');
    if(!S.costo.trim()) e.push('Costo requerido');
    if(S.beneficios.length>LIMITS.beneficios) e.push('Beneficios demasiado largos');
    if(S.costo.length>LIMITS.costo) e.push('Costo demasiado largo');
  }
  if(s===5){
    const conNombre=S.colabs.filter(c=>c.nombre.trim());
    if(!conNombre.length) e.push('Agrega al menos un colaborador');
    if(conNombre.some(c=>!c.empleado.trim())) e.push('El número de control es obligatorio para continuar');
  }
  return e;
}

function normTxt(s){
  return String(s||'').replace(/\s+/g,' ').trim().toLowerCase();
}

function getShapeTextBody(sp){
  return [...sp.getElementsByTagName('*')].find(e=>e.localName==='txBody');
}

function getShapeFullText(sp){
  const tb=getShapeTextBody(sp);
  if(!tb) return '';
  const ts=[...tb.getElementsByTagName('*')].filter(e=>e.localName==='t');
  return normTxt(ts.map(t=>t.textContent||'').join(' '));
}

function findApprovedBadgeShape(doc){
  const sps=[...doc.getElementsByTagName('*')].filter(e=>e.localName==='sp');
  for(const sp of sps){
    const txt=getShapeFullText(sp);
    if(txt.includes('approved as good practice')) return sp;
  }
  return null;
}

function getShapeBox(sp){
  const spPr=[...sp.getElementsByTagName('*')].find(e=>e.localName==='spPr');
  if(!spPr) return null;
  const xfrm=[...spPr.getElementsByTagName('*')].find(e=>e.localName==='xfrm');
  if(!xfrm) return null;
  const off=[...xfrm.getElementsByTagName('*')].find(e=>e.localName==='off');
  const ext=[...xfrm.getElementsByTagName('*')].find(e=>e.localName==='ext');
  if(!off||!ext) return null;
  return {
    x:parseInt(off.getAttribute('x'),10),
    y:parseInt(off.getAttribute('y'),10),
    cx:parseInt(ext.getAttribute('cx'),10),
    cy:parseInt(ext.getAttribute('cy'),10)
  };
}

/* Si la plantilla no expone coordenadas explícitas para el sello "Approved as
   good practice" (por ejemplo, porque su posición viene heredada del layout),
   usamos esta zona como respaldo (esquina inferior derecha del slide). */
const BADGE_FALLBACK_BOX={x:9500000,y:6000000,cx:2350000,cy:700000};

async function generatePPTX(){
  set({loading:true,error:null});
  try{
    const zip=await JSZip.loadAsync(b64ToU8(TEMPLATE_B64));
    const allFiles=Object.keys(zip.files);
    const slidePath=allFiles.find(f=>/ppt\/slides\/slide\d+\.xml$/.test(f)&&!f.includes('_rels'));
    if(!slidePath) throw new Error('No se encontró el slide principal.');
    const relsPath=slidePath.replace(/ppt\/slides\/(slide\d+\.xml)/,'ppt/slides/_rels/$1.rels');
    const xmlStr=await zip.file(slidePath).async('string');
    const parser=new DOMParser();
    const doc=parser.parseFromString(xmlStr,'application/xml');
    if(doc.querySelector('parsererror')) throw new Error('XML inválido en la plantilla.');
    const ser=new XMLSerializer();

    let badgeBox=null;
    const approvedSp=findApprovedBadgeShape(doc);
    if(approvedSp){
      badgeBox=getShapeBox(approvedSp)||BADGE_FALLBACK_BOX;
      const approvedTb=getShapeTextBody(approvedSp);
      if(approvedTb&&(S.impactoHSE||S.impactoFiveS)) clearTx(approvedTb);
    }else if(S.impactoHSE||S.impactoFiveS){
      badgeBox=BADGE_FALLBACK_BOX;
    }

    const hdr=getShape(doc,'Rectangle 6');
    if(hdr){
      const tb=[...hdr.getElementsByTagName('*')].find(e=>e.localName==='txBody');
      if(tb){
        clearTx(tb);
        tb.appendChild(makePara(makeRun('The idea of '+S.mes+' '+S.anio,{sz:2000,bold:true,color:'FFFFFF'}),{noBullet:true}));
        tb.appendChild(makePara(makeRun('Title',{sz:2000,bold:true,color:'FFFFFF'}),{noBullet:true}));
      }
    }

    const allSps=[...doc.getElementsByTagName('*')].filter(e=>e.localName==='sp');
    for(const sp of allSps){
      const cnv=[...sp.getElementsByTagName('*')].find(e=>e.localName==='cNvPr');
      if(cnv&&cnv.getAttribute('name')==='Rectangle à coins arrondis 3'){
        const tb=[...sp.getElementsByTagName('*')].find(e=>e.localName==='txBody');
        if(tb){
          clearTx(tb);
          tb.appendChild(makePara(makeRun(S.titulo,{sz:1100,bold:true,color:'1E293B'}),{noBullet:true,align:'ctr'}));
        }
      }
    }

    const t13=getFrame(doc,'Tableau 13');
    if(t13){
      const h=getCell(t13,0,0);
      if(h) writeTextToCell(h,'Problem',{size:1050,bold:true,color:'FFFFFF'});
      const c=getCell(t13,1,0);
      if(c) writeTextToCell(c,S.antes_texto,{size:fontByLength(S.antes_texto,1050,900,760),bold:false,color:'000000'});
    }

    const t14=getFrame(doc,'Tableau 14');
    if(t14){
      const h=getCell(t14,0,0);
      if(h) writeTextToCell(h,'Proposal applied',{size:1050,bold:true,color:'FFFFFF'});
      const c=getCell(t14,1,0);
      if(c) writeTextToCell(c,S.despues_texto,{size:fontByLength(S.despues_texto,1050,900,760),bold:false,color:'000000'});
    }

    const t15=getFrame(doc,'Tableau 15');
    if(t15){
      const c=getCell(t15,1,0);
      if(c) writeTextToCell(c,S.beneficios,{size:fontByLength(S.beneficios,1050,900,800),bold:true,color:'000000'});
    }

    const t16=getFrame(doc,'Tableau 16');
    if(t16){
      const c=getCell(t16,0,1);
      if(c) writeTextToCell(c,S.costo||'0€',{size:1100,bold:true,align:'ctr',color:'000000'});
    }

    const t17=getFrame(doc,'Tableau 17');
    if(t17){
      const tb=getCell(t17,1,0);
      if(tb){
        clearTx(tb);
        const validos=S.colabs.filter(c=>c.nombre.trim());
        if(validos.length){
          validos.forEach(c=>{
            const txt=trimLimit(c.nombre,LIMITS.nombre)+' #'+trimLimit(c.empleado,LIMITS.empleado)+' - '+trimLimit(c.area||'',LIMITS.area);
            tb.appendChild(makePara(makeRun(txt,{sz:900,bold:true,typeface:'Calibri',color:'000000'}),{noBullet:true}));
          });
        }else{ tb.appendChild(makePara()); }
      }
    }

    zip.file(slidePath,ser.serializeToString(doc));

    const relsFile=zip.file(relsPath);
    if(relsFile){
      const rxml=await relsFile.async('string');
      const rdoc=parser.parseFromString(rxml,'application/xml');
      let imgN=100;

      async function addImg(imgObj,x,y,cx,cy){
        if(!imgObj||!imgObj.data) return;
        const rId='rId'+imgN++;
        const fname='user_'+rId+'.'+imgObj.ext;
        zip.file('ppt/media/'+fname,b64ToU8(imgObj.data));
        const rel=rdoc.createElementNS(NSREL,'Relationship');
        rel.setAttribute('Id',rId);
        rel.setAttribute('Type','http://schemas.openxmlformats.org/officeDocument/2006/relationships/image');
        rel.setAttribute('Target','../media/'+fname);
        rdoc.documentElement.appendChild(rel);
        const picXml=
          '<p:pic xmlns:p="'+NSP+'" xmlns:a="'+NSA+'" xmlns:r="'+NSR+'">' +
          '<p:nvPicPr><p:cNvPr id="'+(9000+imgN)+'" name="UI_'+rId+'"/>' +
          '<p:cNvPicPr><a:picLocks noChangeAspect="1"/></p:cNvPicPr><p:nvPr/></p:nvPicPr>' +
          '<p:blipFill><a:blip r:embed="'+rId+'"/><a:stretch><a:fillRect/></a:stretch></p:blipFill>' +
          '<p:spPr><a:xfrm><a:off x="'+x+'" y="'+y+'"/><a:ext cx="'+cx+'" cy="'+cy+'"/></a:xfrm>' +
          '<a:prstGeom prst="rect"><a:avLst/></a:prstGeom></p:spPr></p:pic>';
        const latest=await zip.file(slidePath).async('string');
        const ldoc=parser.parseFromString(latest,'application/xml');
        const spTree=[...ldoc.getElementsByTagName('*')].find(e=>e.localName==='spTree');
        if(spTree){
          const picDoc=parser.parseFromString(picXml,'application/xml');
          spTree.appendChild(ldoc.importNode(picDoc.documentElement,true));
          zip.file(slidePath,ser.serializeToString(ldoc));
        }
      }

      await addImg(S.antes_img,250000,1850000,3950000,1200000);
      await addImg(S.despues_img,5050000,1850000,3950000,1200000);

      if(badgeBox&&(S.impactoHSE||S.impactoFiveS)){
        const badges=[];
        if(S.impactoHSE) badges.push({data:HSE_LOGO_B64,ext:'png',ratio:HSE_LOGO_RATIO});
        if(S.impactoFiveS) badges.push({data:FIVE_S_LOGO_B64,ext:'png',ratio:FIVE_S_LOGO_RATIO});
        const gap=60000;
        const n=badges.length;
        const cellW=Math.floor((badgeBox.cx-gap*(n-1))/Math.max(n,1));
        let curX=badgeBox.x;
        for(const b of badges){
          let w=cellW, h=Math.round(cellW/b.ratio);
          if(h>badgeBox.cy){ h=badgeBox.cy; w=Math.round(h*b.ratio); }
          const cellCenterX=curX+cellW/2;
          const x=Math.round(cellCenterX-w/2);
          const y=Math.round(badgeBox.y+(badgeBox.cy-h)/2);
          await addImg({data:b.data,ext:b.ext},x,y,w,h);
          curX+=cellW+gap;
        }
      }

      zip.file(relsPath,ser.serializeToString(rdoc));
    }

    const blob=await zip.generateAsync({
      type:'blob',
      mimeType:'application/vnd.openxmlformats-officedocument.presentationml.presentation',
      compression:'DEFLATE'
    });

    set({loading:false,success:true,dlUrl:URL.createObjectURL(blob)});

  }catch(err){
    console.error('Error:',err);
    set({loading:false,error:err.message});
  }
}

async function loadImg(e,field){
  const f=e.target.files[0];
  if(!f) return;
  if(f.size>5*1024*1024){ alert('La imagen debe pesar máximo 5MB.'); return; }
  const allowed=['jpg','jpeg','png','webp'];
  const ext=f.name.split('.').pop().toLowerCase();
  if(!allowed.includes(ext)){ alert('Formato no permitido. Usa JPG, PNG o WEBP.'); return; }
  const data=await new Promise(res=>{
    const r=new FileReader();
    r.onload=ev=>res({data:ev.target.result.split(',')[1],ext:ext,preview:ev.target.result});
    r.readAsDataURL(f);
  });
  set({[field]:data});
}

function imgUp(id,cur){
  if(cur){
    return `<div class="img-upload" style="pointer-events:none"><img src="${cur.preview}" class="img-preview"/></div>
    <button class="img-clear" id="clr-${id}">✕ Quitar</button>`;
  }
  return `<div class="img-upload"><input type="file" id="${id}" accept="image/*"/>
    <p style="font-size:15px;margin-bottom:4px">🖼️</p>
    <p><strong>Clic para subir</strong> imagen opcional</p>
    <p style="font-size:11px;color:#94A3B8;margin-top:2px">JPG · PNG · WEBP · máx 5MB</p></div>`;
}

function counter(value,limit){
  const len=String(value||'').length;
  return `<div class="${len>=limit?'counter limit':'counter'}">${len}/${limit}</div>`;
}

function areaSelect(idx,current){
  const opts=AREAS.map(a=>`<option value="${esc(a)}" ${current===a?'selected':''}>${esc(a)}</option>`).join('');
  return `<select class="ca" data-i="${idx}"><option value="">— Área —</option>${opts}</select>`;
}

      <div class="field"><label>Descripción de la propuesta <span class="req">*</span></label>
        <textarea id="dt" maxlength="${LIMITS.despues_texto}" placeholder="Ej: Se implementó un método visual para reducir tiempos...">${esc(S.despues_texto)}</textarea>
        ${counter(S.despues_texto,LIMITS.despues_texto)}</div>
      <div class="field"><label>Imagen de la propuesta opcional</label>${imgUp('di',S.despues_img)}</div>${nav}`;
  }
  else if(S.step===4){
    content=`<div class="card-title">💡 Beneficios y costo</div>
      <p class="card-desc">Solo se editarán el área de beneficios y el costo.</p>
      <div class="field"><label>Beneficios / mejoras <span class="req">*</span></label>
        <textarea id="bn" maxlength="${LIMITS.beneficios}" placeholder="Ej: Reducción de tiempo, mejora de flujo, ahorro anual...">${esc(S.beneficios)}</textarea>
        ${counter(S.beneficios,LIMITS.beneficios)}</div>
      <div class="field"><label>Costo de implementación <span class="req">*</span></label>
        <input type="text" id="co" placeholder="Ej: 0€" value="${esc(S.costo)}" maxlength="${LIMITS.costo}"/>

      <div class="field">

        <div style="display:flex;gap:16px;flex-wrap:wrap;margin-top:2px">

    content=`<div class="card-title">✨ Revisión final</div>
      <p class="card-desc">Confirma la información. El diseño, logos, colores y espacios de la plantilla no se modifican.</p>

  if(clrai) clrai.onclick=()=>set({antes_img:null});

  const dt=document.getElementById('dt');
  if(dt) dt.oninput=e=>{ S.despues_texto=trimLimit(e.target.value,LIMITS.despues_texto); const n=document.getElementById('nx'); if(n) n.disabled=validate(S.step).length>0; };

  const di=document.getElementById('di');
  if(di) di.onchange=e=>loadImg(e,'despues_img');

  const clrdi=document.getElementById('clr-di');
  if(clrdi) clrdi.onclick=()=>set({despues_img:null});

  const bn=document.getElementById('bn');
  if(bn) bn.oninput=e=>{ S.beneficios=trimLimit(e.target.value,LIMITS.beneficios); const n=document.getElementById('nx'); if(n) n.disabled=validate(S.step).length>0; };

  const co=document.getElementById('co');
  if(co) co.oninput=e=>{ S.costo=trimLimit(e.target.value,LIMITS.costo); const n=document.getElementById('nx'); if(n) n.disabled=validate(S.step).length>0; };

  const impHSE=document.getElementById('impHSE');
  if(impHSE) impHSE.onchange=e=>set({impactoHSE:e.target.checked});

  const impFiveS=document.getElementById('impFiveS');
  if(impFiveS) impFiveS.onchange=e=>set({impactoFiveS:e.target.checked});

  document.querySelectorAll('.cn').forEach(el=>{
    el.oninput=e=>{ const i=+e.target.dataset.i; S.colabs[i].nombre=trimLimit(e.target.value,LIMITS.nombre); const n=document.getElementById('nx'); if(n) n.disabled=validate(S.step).length>0; };
  });

  document.querySelectorAll('.ce').forEach(el=>{
    el.oninput=e=>{ const i=+e.target.dataset.i; S.colabs[i].empleado=trimLimit(e.target.value,LIMITS.empleado); const n=document.getElementById('nx'); if(n) n.disabled=validate(S.step).length>0; };
  });

  document.querySelectorAll('.ca').forEach(el=>{
    el.onchange=e=>{ const i=+e.target.dataset.i; S.colabs[i].area=e.target.value; };
  });

  document.querySelectorAll('.btn-remove').forEach(el=>{
    el.onclick=e=>{ const i=+e.target.dataset.i; if(S.colabs.length>1){ S.colabs.splice(i,1); set({colabs:[...S.colabs]}); } };
  });

  const addC=document.getElementById('addC');
  if(addC) addC.onclick=()=>set({colabs:[...S.colabs,{nombre:'',empleado:'',area:''}]});
}

render();
</script>

</body>
</html>
